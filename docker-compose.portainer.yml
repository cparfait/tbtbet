# ──────────────────────────────────────────────────────────────────────────────
# DaronsFC — Portainer Stack
# ──────────────────────────────────────────────────────────────────────────────
# Serveur : /home/apache/daronscup
# Exposition : port 8895 → NPM → https://foot.cparfait.ovh
#
# Déploiement dans Portainer :
#   1. Stacks → Add stack → nom : daronsfc
#   2. Méthode : Web editor → coller ce contenu
#   3. Onglet "Env" : remplir les variables
#   4. Deploy the stack
#
# Image : ghcr.io/cparfait/daronscup:latest
# → Mise à jour automatique via GitHub Actions sur chaque push sur `main`.
# → Portainer webhook déclenche le pull + redémarrage.
#
# Pour rendre l'image publique (lecture sans token) :
#   GitHub → Packages → daronscup → Package settings → Change visibility → Public
# Sinon Portainer doit s'authentifier :
#   Portainer → Registries → Add registry → GitHub (ghcr.io)
#
# Variables à définir dans Portainer (onglet Env) :
#   AUTH_SECRET          = openssl rand -base64 32
#   AUTH_URL             = https://foot.cparfait.ovh   ← NextAuth v5 (obligatoire)
#   NEXTAUTH_URL         = https://foot.cparfait.ovh   ← compat NextAuth v4
#   AUTH_GOOGLE_ID       = (ton Google Client ID)
#   AUTH_GOOGLE_SECRET   = (ton Google Client Secret)
#   FOOTBALL_DATA_TOKEN  = (ton token football-data.org)
#   POSTGRES_PASSWORD    = (mot de passe sécurisé)
#   ADMIN_EMAIL          = admin@daronsfc.fr  ← email du compte admin
#   ADMIN_PASSWORD       = (mot de passe admin, créé au 1er démarrage)
# ──────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    container_name: daronsfc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daronsfc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daronsfc_secret}
      POSTGRES_DB: ${POSTGRES_DB:-daronsfc}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - daronsfc_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daronsfc}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: ghcr.io/cparfait/daronscup:migrate
    pull_policy: always
    container_name: daronsfc_migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-daronsfc}:${POSTGRES_PASSWORD:-daronsfc_secret}@db:5432/${POSTGRES_DB:-daronsfc}?schema=public"
      DIRECT_URL: "postgresql://${POSTGRES_USER:-daronsfc}:${POSTGRES_PASSWORD:-daronsfc_secret}@db:5432/${POSTGRES_DB:-daronsfc}?schema=public"
    networks:
      - daronsfc_net

  app:
    image: ghcr.io/cparfait/daronscup:latest
    pull_policy: always
    container_name: daronsfc_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8895:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-daronsfc}:${POSTGRES_PASSWORD:-daronsfc_secret}@db:5432/${POSTGRES_DB:-daronsfc}?schema=public"
      DIRECT_URL: "postgresql://${POSTGRES_USER:-daronsfc}:${POSTGRES_PASSWORD:-daronsfc_secret}@db:5432/${POSTGRES_DB:-daronsfc}?schema=public"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "${AUTH_URL:-https://foot.cparfait.ovh}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-https://foot.cparfait.ovh}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
      FOOTBALL_DATA_TOKEN: "${FOOTBALL_DATA_TOKEN:-}"
      FOOTBALL_DATA_COMPETITION: "${FOOTBALL_DATA_COMPETITION:-WC}"
      SYNC_LIVE_SECONDS: "${SYNC_LIVE_SECONDS:-90}"
      SYNC_IDLE_MINUTES: "${SYNC_IDLE_MINUTES:-30}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@daronsfc.fr}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@daronsfc.fr}"
      NODE_ENV: production
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - daronsfc_net

networks:
  daronsfc_net:
    driver: bridge

volumes:
  pgdata:
    name: daronsfc_pgdata