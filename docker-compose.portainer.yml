# ──────────────────────────────────────────────────────────────────────────────
# TBT Bet — Portainer Stack
# ──────────────────────────────────────────────────────────────────────────────
# Déploiement dans Portainer :
#   1. Stacks → Add stack → nom : tbtbet
#   2. Méthode : Web editor → coller ce contenu
#   3. Onglet "Env" : remplir les variables obligatoires
#   4. Deploy the stack
#
# Image : ghcr.io/cparfait/tbtbet:latest
# → Mise à jour automatique via GitHub Actions sur chaque push sur `main`.
# → Portainer webhook déclenche le pull + redémarrage.
#
# Webhook Portainer → GitHub Actions secret :
#   Portainer → Stacks → tbtbet → Webhooks → copier l'URL
#   GitHub → Settings → Secrets → PORTAINER_WEBHOOK → coller l'URL
#
# Pour rendre les images publiques (lecture sans token) :
#   GitHub → Packages → tbtbet → Package settings → Change visibility → Public
# Sinon Portainer doit s'authentifier :
#   Portainer → Registries → Add registry → GitHub (ghcr.io)
#
# Variables obligatoires (onglet Env de Portainer) :
#   AUTH_SECRET        = openssl rand -base64 32
#   AUTH_URL           = https://tbtbet.cparfait.ovh   ← URL publique
#   ADMIN_EMAIL        = admin@example.com
#   ADMIN_PASSWORD     = (mot de passe admin initial)
#   POSTGRES_PASSWORD  = (mot de passe sécurisé)
#   AUTH_GOOGLE_ID     = xxxxxx.apps.googleusercontent.com
#   AUTH_GOOGLE_SECRET = GOCSPX-xxxxxxxxxxxxxxxxx
# ──────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    container_name: tbtbet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tbtbet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tbtbet_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tbtbet}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tbtbet_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tbtbet}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: ghcr.io/cparfait/tbtbet:migrate
    pull_policy: always
    container_name: tbtbet_migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-tbtbet}:${POSTGRES_PASSWORD:-tbtbet_secret}@db:5432/${POSTGRES_DB:-tbtbet}?schema=public"
      DIRECT_URL: "postgresql://${POSTGRES_USER:-tbtbet}:${POSTGRES_PASSWORD:-tbtbet_secret}@db:5432/${POSTGRES_DB:-tbtbet}?schema=public"
    networks:
      - tbtbet_net

  app:
    image: ghcr.io/cparfait/tbtbet:latest
    pull_policy: always
    container_name: tbtbet_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${PORT:-8896}:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-tbtbet}:${POSTGRES_PASSWORD:-tbtbet_secret}@db:5432/${POSTGRES_DB:-tbtbet}?schema=public"
      DIRECT_URL: "postgresql://${POSTGRES_USER:-tbtbet}:${POSTGRES_PASSWORD:-tbtbet_secret}@db:5432/${POSTGRES_DB:-tbtbet}?schema=public"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "${AUTH_URL:-https://tbtbet.cparfait.ovh}"
      NEXTAUTH_URL: "${AUTH_URL:-https://tbtbet.cparfait.ovh}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@tbtbet.fr}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      NODE_ENV: production
    networks:
      - tbtbet_net

networks:
  tbtbet_net:
    driver: bridge

volumes:
  pgdata:
    name: tbtbet_pgdata
