name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/tbtbet

jobs:
  build-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Image app (stage runner) ──────────────────────────────────────────
      - name: Build & push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Image migrator (stage migrator) ──────────────────────────────────
      - name: Build & push migrator image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: ${{ env.IMAGE }}:migrate
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Portainer redeploy
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Redeploy stack via Portainer webhook
        run: |
          WEBHOOK="${{ secrets.PORTAINER_WEBHOOK }}"
          if [ -z "$WEBHOOK" ]; then
            WEBHOOK="${{ vars.PORTAINER_WEBHOOK }}"
          fi
          if [ -n "$WEBHOOK" ]; then
            curl -s -X POST "$WEBHOOK"
            echo "Portainer webhook triggered."
          else
            echo "No webhook configured, skipping."
          fi
