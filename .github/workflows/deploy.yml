# ──────────────────────────────────────────────────────────────────────────────
# DaronsFC — CI/CD
#
# Déclenchement : push sur `main`
# Pipeline :
#   1. Build l'image Docker (linux/amd64)
#   2. Push sur GitHub Container Registry (ghcr.io)
#   3. Notifie Portainer via webhook → redéploiement automatique
#
# Secrets à configurer dans GitHub → Settings → Secrets → Actions :
#   PORTAINER_WEBHOOK_URL  URL webhook du stack Portainer
#                          (Portainer → Stack → daronsfc → Webhooks → copier l'URL)
# ──────────────────────────────────────────────────────────────────────────────

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Portainer redeploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Webhook Portainer
        run: |
          curl -fsS -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            && echo "✅ Portainer notifié — redéploiement en cours"
